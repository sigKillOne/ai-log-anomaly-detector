input {
  file {
    path => "/usr/share/logstash/ingest_data/clean_test_logs.json"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => "json"
  }
}

filter {
  # Convert microsecond epoch to milliseconds, then set as @timestamp
  ruby {
    code => '
      rt = event.get("__REALTIME_TIMESTAMP")
      if rt
        ms = rt.to_i / 1000
        event.set("@timestamp", LogStash::Timestamp.at(ms / 1000, (ms % 1000) * 1000))
      end
    '
  }

  # Map useful fields to clean names
  mutate {
    rename => {
      "MESSAGE"          => "log_message"
      "PRIORITY"         => "priority"
      "SYSLOG_IDENTIFIER" => "service"
      "_HOSTNAME"        => "hostname"
      "_PID"             => "pid"
      "_TRANSPORT"       => "transport"
    }
  }

  # Priority is a string, cast to integer for ML later
  mutate {
    convert => { "priority" => "integer" }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "arch-logs-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}
